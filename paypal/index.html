<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayPal Simple Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">

        <!-- Header -->
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-xl font-bold uppercase tracking-wider">Terminal de Pago</h1>
            <p id="status-text" class="text-sm opacity-80 mt-1">Sincronizando parámetros...</p>
        </div>

        <!-- Vista de Error -->
        <div id="view-error" class="p-10 text-center hidden">
            <div class="bg-red-50 text-red-600 p-4 rounded-xl mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto mb-2" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
                <p class="font-bold">Configuración incompleta</p>
                <p class="text-sm opacity-80">Falta el client_id en la dirección web.</p>
            </div>
            <p class="text-xs text-gray-400">Uso: /?client_id=ID&total=10.00</p>
        </div>

        <!-- Terminal View -->
        <div id="view-terminal" class="hidden p-8 flex flex-col">
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-500 mb-2 uppercase tracking-tight">Monto a pagar
                    (USD)</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold text-xl">$</span>
                    <input type="number" id="amount-input" step="0.01" placeholder="0.00"
                        class="w-full pl-10 pr-4 py-4 text-3xl font-bold border-2 border-gray-100 rounded-2xl focus:border-blue-500 focus:outline-none transition-colors"
                        oninput="handleAmountChange()">
                </div>
            </div>

            <!-- PayPal Buttons Container -->
            <div id="paypal-button-container"
                class="min-h-[150px] transition-opacity duration-300 opacity-50 pointer-events-none">
                <p class="text-center text-gray-400 py-10 border-2 border-dashed border-gray-100 rounded-2xl italic">
                    Ingrese un monto para habilitar el pago
                </p>
            </div>

            <p id="active-id-display"
                class="mt-8 text-[10px] text-gray-300 text-center break-all font-mono uppercase tracking-tighter"></p>
        </div>

        <!-- Loading Overlay -->
        <div id="loading-overlay" class="fixed inset-0 bg-white/80 hidden flex items-center justify-center z-50">
            <div class="text-center">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto mb-3"></div>
                <p class="text-sm font-medium text-gray-600">Conectando pasarela...</p>
            </div>
        </div>
    </div>
