<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hug-Oh! | Business Solutions</title>
    <link rel="icon" type="image/png" href="https://hug-oh.com/scr/nav-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --accent-blue: #007AFF;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
            --bg-body: #f5f5f7;
            --border-soft: rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: "SF Pro Display", "SF Pro Text", "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        .liquid-glass {
            background: #ffffff;
            border: 1px solid var(--border-soft);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
        }

        .apple-input {
            border-bottom: 2px solid #f2f2f7;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .apple-input:focus {
            border-bottom-color: var(--accent-blue);
        }

        /* Ocultar flechas de input number */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

    <div id="app"
        class="w-full max-w-md liquid-glass rounded-[32px] overflow-hidden transition-all duration-500 hover:shadow-2xl">

        <!-- Header -->
        <div class="px-8 pt-10 pb-6 text-center">
            <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-5">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round" class="text-blue-600">
                    <path d="M21 12H3" />
                    <path d="M12 21V3" />
                </svg>
            </div>
            <h1 class="text-[22px] font-bold tracking-tight text-gray-900">Terminal de Pago</h1>
            <p id="status-text" class="text-[13px] text-gray-400 mt-1.5 font-medium">Sincronizando parámetros...</p>
        </div>

        <!-- Vista de Error -->
        <div id="view-error" class="p-10 text-center hidden">
            <div class="bg-red-50 text-red-600 p-4 rounded-xl mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto mb-2" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
                <p class="font-bold">Configuración incompleta</p>
                <p class="text-sm opacity-80">Falta el client_id en la dirección web.</p>
            </div>
            <p class="text-xs text-gray-400">Uso: /?client_id=ID&total=10.00</p>
        </div>

        <!-- Terminal View -->
        <div id="view-terminal" class="hidden p-8 pt-4 flex flex-col">
            <div class="mb-10 text-center">
                <label class="block text-[11px] font-bold text-gray-400 mb-3 uppercase tracking-[0.15em]">Monto a pagar
                    (USD)</label>
                <div class="relative inline-block w-full max-w-[280px]">
                    <span class="absolute left-0 top-1/2 -translate-y-1/2 text-gray-300 font-medium text-3xl">$</span>
                    <input type="number" id="amount-input" step="0.01" placeholder="0.00"
                        class="apple-input w-full pl-8 pr-2 py-4 text-5xl font-bold text-gray-900 focus:outline-none bg-transparent text-center"
                        oninput="handleAmountChange()">
                </div>
            </div>

            <!-- PayPal Buttons Container -->
            <div id="paypal-button-container"
                class="min-h-[160px] transition-all duration-500 opacity-50 pointer-events-none transform scale-[0.98]">
                <div
                    class="py-12 px-6 border border-dashed border-gray-100 rounded-[24px] bg-gray-50/50 flex items-center justify-center">
                    <p class="text-center text-gray-400 text-[13px] font-medium italic">
                        Ingrese un monto para continuar
                    </p>
                </div>
            </div>

            <p id="active-id-display"
                class="mt-10 text-[9px] text-gray-300 text-center break-all font-mono uppercase tracking-[0.2em] opacity-60">
            </p>
        </div>

        <!-- Loading Overlay -->
        <div id="loading-overlay" class="fixed inset-0 bg-white/80 hidden flex items-center justify-center z-50">
            <div class="text-center">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto mb-3"></div>
                <p class="text-sm font-medium text-gray-600">Conectando pasarela...</p>
            </div>
        </div>
    </div>
