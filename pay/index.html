<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hug-Oh! | Business Platform</title>
    <link rel="shortcut icon" href="/scr/nav-icon.png" />
    <script src="https://www.paypal.com/sdk/js?client-id=AcymnwK5lJgrKdP8xtaK5RqNa_f5kIzTSSM0xXrUHqVZykepF5VY1agy8Xx0szrJc9t_yxu7_fUfcFjL&currency=USD"></script>
    <style>
        :root {
            --apple-blue: #0071e3;
            --apple-bg: #f5f5f7;
            --apple-card: rgba(255, 255, 255, 0.8);
            --apple-text: #1d1d1f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: var(--apple-card);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.4);
        }

        h1 { font-size: 30px; font-weight: 600; letter-spacing: -0.8px; margin-bottom: 8px; }
        p { color: #86868b; font-size: 17px; margin-bottom: 30px; line-height: 1.4; }

        .price { font-size: 48px; font-weight: 700; margin-bottom: 32px; letter-spacing: -1px; }
        .price span { font-size: 20px; color: #86868b; font-weight: 400; }

        .input-group { text-align: left; margin-bottom: 24px; }
        label { font-size: 13px; font-weight: 600; color: #1d1d1f; margin-bottom: 10px; display: block; margin-left: 2px; }

        select, input {
            width: 100%;
            padding: 16px;
            border: 1px solid #d2d2d7;
            border-radius: 14px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s ease-in-out;
        }

        select:focus, input:focus { border-color: var(--apple-blue); background: #fff; }

        #paypal-button-container { margin-top: 30px; }

        .success-screen { display: none; }

        .download-button {
            background-color: var(--apple-blue);
            color: white;
            border: none;
            padding: 18px 30px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: transform 0.2s ease;
        }

        .download-button:active { transform: scale(0.97); }

        .footer { font-size: 12px; color: #a1a1a6; margin-top: 30px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <div id="payment-view">
        <h1>Licencia Comercial</h1>
        <p>Acceso profesional ilimitado para tu negocio.</p>
        
        <div class="price">$85<span>.00 USD</span></div>

        <div class="input-group">
            <label>Tipo de Titular</label>
            <select id="type" onchange="updateLabel()">
                <option value="Persona">Persona Natural</option>
                <option value="Empresa">Empresa</option>
            </select>
        </div>

        <div class="input-group">
            <label id="dynamic-label">Nombre Completo</label>
            <input type="text" id="name" placeholder="Nombre que aparecerá en la licencia">
        </div>

        <div id="paypal-button-container"></div>
        <p class="footer">Transacción segura vía PayPal. Pago único, de por vida.</p>
    </div>

    <div id="success-view" class="success-screen">
        <h1 style="color: #28a745;">Licencia Generada</h1>
        <p>Gracias por tu compra. Ya puedes descargar tu archivo de activación comercial.</p>
        <button class="download-button" onclick="createKeyFile()">Descargar license.key</button>
        <p class="footer">Este archivo contiene tu identificador comercial: 88045.</p>
    </div>
</div>
