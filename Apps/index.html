<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>Hug-Oh! • Tus Apps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jsPDF + autoTable para exportar historial a PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="style.css">
        <!-- Estilos para la notificación en la parte inferior -->
        <style>
            /* Nuevas animaciones para la Landing Page */
            @keyframes float {
                0% { transform: translateY(0px); }
                50% { transform: translateY(-10px); }
                100% { transform: translateY(0px); }
            }
            .animate-float {
                animation: float 6s ease-in-out infinite;
            }
            @keyframes slideUpFade {
                from { opacity: 0; transform: translateY(40px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .animate-slide-up {
                animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
                opacity: 0; /* Start hidden */
            }
            .delay-100 { animation-delay: 0.1s; }
            .delay-200 { animation-delay: 0.2s; }
            .delay-300 { animation-delay: 0.3s; }
            
            .glass-card {
                background: rgba(255, 255, 255, 0.7);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.5);
            }
            
            #message-box {
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 100;
                min-width: 300px;
                text-align: center;
            }
        </style>
        <!-- button-animations-start -->
        <style>
        /* Animaciones para botones - inicio */
        .btn-primary, .btn-secondary, button {
            position: relative;
            overflow: hidden;
            transition: transform .18s cubic-bezier(.2,.8,.2,1), box-shadow .18s;
            will-change: transform;
        }
        .btn-primary:hover, .btn-secondary:hover, button:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 8px 20px rgba(0,0,0,.12);
        }
        .btn-primary:active, .btn-secondary:active, button:active {
            transform: translateY(0) scale(.995);
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }
        /* Focus ring */
        button:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(59,130,246,.12);
        }

        /* Ripple */
        .btn-ripple {
            position: relative;
            overflow: hidden;
        }
        .btn-ripple .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple 600ms linear;
            background-color: rgba(255,255,255,0.6);
            pointer-events: none;
        }
        @keyframes ripple {
            to { transform: scale(4); opacity: 0; }
        }
        /* Subtle icon bounce for .inline-6 images */
        .inline-6:active { transform: translateY(1px) scale(.98); }
        /* Make rounded full buttons appear smoother */
        .rounded-full { transition: transform .18s, box-shadow .18s; }
        /* Animación cuando la ventana se hace más alta (suavizada) */
        #app.viewport-expand-anim {
            animation: viewportExpand 600ms cubic-bezier(.22,.9,.3,1) both;
            transform-origin: top center;
            will-change: transform, opacity;
        }
        @keyframes viewportExpand {
            from { transform: translateY(-6px) scaleY(.997); opacity: .98; }
            50%  { transform: translateY(-2px) scaleY(.9985); opacity: .995; }
            to   { transform: translateY(0) scaleY(1); opacity: 1; }
        }
        /* Hover/Focus effect para el saldo */
        #balance-display {
            display: inline-block;
            transition: transform 260ms cubic-bezier(.22,.9,.3,1),
                        text-shadow 260ms ease, color 260ms ease, filter 260ms ease;
            will-change: transform, text-shadow, filter;
        }
        #balance-display:hover, #balance-display:focus, #balance-display:focus-visible {
            transform: scale(1.08);
            color: #0ea5e9; /* ligero tintado azul */
            text-shadow: 0 10px 30px rgba(14,165,233,0.18), 0 2px 8px rgba(0,0,0,0.06);
            filter: drop-shadow(0 10px 24px rgba(14,165,233,0.12));
        }
        /* Reducción de movimiento para usuarios que la prefieren */
        @media (prefers-reduced-motion: reduce) {
            #balance-display { transition: none; transform: none; text-shadow: none; filter: none; }
        }
        /* End marker */
        </style>
        <style>
            /* Estilos para la pantalla de inicio */
            #landing-view {
                animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            }
            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
        </style>
        <!-- button-animations-end -->
</head>
<body class="min-h-screen flex items-start justify-center p-4 md:p-8">

    <div id="app" class="w-full max-w-screen-xl mx-auto">
        
        <!-- Pantalla de Inicio Renovada -->
        <div id="landing-view" class="fixed inset-0 z-50 bg-slate-50 overflow-y-auto overflow-x-hidden">
            
            <!-- Fondo Dinámico -->
            <div class="fixed inset-0 pointer-events-none">
                <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-blue-400/20 rounded-full blur-[100px] animate-float"></div>
                <div class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-cyan-400/20 rounded-full blur-[100px] animate-float" style="animation-delay: -3s;"></div>
            </div>

            <!-- Contenido Principal -->
            <div class="relative z-10 min-h-screen flex flex-col">
                
                <!-- Navbar Simple -->
                <nav class="w-full max-w-7xl mx-auto p-6 flex justify-between items-center animate-slide-up">
                    <img src="../Scr/logo-positive.svg" onclick="window.location.href='../'" alt="HUG Bank Logo" class="h-12 md:h-16">
                    <!-- Botón de acceso eliminado -->
                </nav>

                <!-- Hero Section -->
                <main class="flex-grow flex flex-col items-center justify-center text-center px-4 py-12 md:py-20 max-w-5xl mx-auto">
                    
                    <h1 class="text-5xl md:text-7xl lg:text-8xl font-black text-slate-900 tracking-tight leading-[1.1] mb-8 animate-slide-up delay-100">
                        Gestiona tu mundo <br/>
                        <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 via-cyan-500 to-blue-600 bg-[length:200%_auto] animate-pulse">financiero online.</span>
                    </h1>
                    
                    <p class="text-xl md:text-2xl text-slate-600 mb-12 max-w-3xl font-medium leading-relaxed animate-slide-up delay-200">
                        La plataforma definitiva para tus finanzas personales y empresariales. 
                        Seguridad de vanguardia, transferencias instantáneas y control total.
                    </p>

                    <div class="animate-slide-up delay-300 w-full flex flex-col sm:flex-row justify-center gap-4">
                        <button onclick="window.location.href='../Bank'" class="group relative flex items-center justify-center gap-4 px-12 py-6 bg-blue-600 text-white text-xl font-bold rounded-full shadow-2xl hover:bg-blue-700 hover:shadow-blue-500/50 hover:-translate-y-1 transition-all duration-300 btn-primary overflow-hidden min-w-[240px]">
                            <div class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
                            <span>Ir a Bank</span>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:translate-x-2 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </button>
                        
                        <button onclick="window.location.href='../Business'" class="group relative flex items-center justify-center gap-4 px-12 py-6 bg-slate-800 text-white text-xl font-bold rounded-full shadow-2xl hover:bg-slate-900 hover:shadow-slate-500/50 hover:-translate-y-1 transition-all duration-300 btn-secondary overflow-hidden min-w-[240px]">
                            <div class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
                            <span>Ir a Business</span>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:translate-x-2 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                            </svg>
                        </button>
                    </div>

                </main>

                <footer class="py-8 text-center text-slate-400 text-sm font-medium">
                    © 2024 Hug-Oh! Financial Services. Todos los derechos reservados.
                </footer>
            </div>
        </div>
    
    <!-- Script para transición de pantalla de inicio -->
    <script>
        document.getElementById('enter-app-btn').addEventListener('click', function() {
            const landing = document.getElementById('landing-view');
            const dashboard = document.getElementById('dashboard-view');
            
            // Animación de salida
            landing.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
            landing.style.opacity = '0';
            landing.style.transform = 'translateY(-20px)';
            
            setTimeout(() => {
                landing.classList.add('hidden');
                dashboard.classList.remove('hidden');
                // Animación de entrada suave para el dashboard
                dashboard.animate([
                    { opacity: 0, transform: 'translateY(10px)' },
                    { opacity: 1, transform: 'translateY(0)' }
                ], { duration: 400, easing: 'ease-out' });
            }, 400);
        });
    </script>

        <!-- button-animations-script-start -->
        <script>
        (function(){
            // Añade efecto ripple a botones
            function createRipple(e){
                const btn = e.currentTarget;
                const rect = btn.getBoundingClientRect();
                const ripple = document.createElement('span');
                ripple.className = 'ripple';
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
                ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
                btn.appendChild(ripple);
                setTimeout(()=> ripple.remove(), 700);
            }
            // select buttons to apply ripple: all visible buttons, plus elements with role=button
            const buttons = Array.from(document.querySelectorAll('button, [role="button"], .btn-primary, .btn-secondary'));
            buttons.forEach(b=>{
                b.classList.add('btn-ripple');
                b.addEventListener('click', createRipple);
            });
            // Detecta aumento de altura de la ventana y aplica animación (más suave)
            let lastInnerHeight = window.innerHeight;
            let resizeTimer = null;
            window.addEventListener('resize', function(){
                const newH = window.innerHeight;
                // Umbral más pequeño para reactividad pero evitamos micro cambios
                const THRESHOLD = 20;
                if (newH > lastInnerHeight + THRESHOLD) {
                    const app = document.getElementById('app');
                    if (app) {
                        // Reaplicar clase de forma segura y más lenta
                        app.classList.remove('viewport-expand-anim');
                        void app.offsetWidth; // reflow
                        app.classList.add('viewport-expand-anim');
                        // Mantener la clase hasta que termine la animación
                        setTimeout(()=> app.classList.remove('viewport-expand-anim'), 700);
                    }
                }
                // Actualiza lastInnerHeight con debounce para evitar flapping
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(()=> { lastInnerHeight = window.innerHeight; }, 240);
            });
        })();
        </script>
        <!-- button-animations-script-end -->
        <script>
        // Manejo simple de vistas para QR (abre como ventana separada similar a transfer-view)
        document.addEventListener('DOMContentLoaded', function(){
            const showQrBtn = document.getElementById('show-qr-btn');
            const closeQrBtn = document.getElementById('close-qr-btn');
            const dashboardView = document.getElementById('dashboard-view');
            const transferView = document.getElementById('transfer-view');
            const qrView = document.getElementById('qr-view');

            function showView(view){
                [dashboardView, transferView, qrView].forEach(v=> { if(v) v.classList.add('hidden'); });
                if(view) view.classList.remove('hidden');
                // scroll to top of view when shown
                if(view) view.scrollIntoView({behavior: 'smooth', block: 'start'});
                // If opening QR view, ensure overlay is visible by default
                if (view === qrView) {
                    const overlay = document.getElementById('qr-overlay');
                    const btn = document.getElementById('qr-reveal-btn');
                    if (overlay) overlay.classList.remove('hidden');
                    if (btn) btn.setAttribute('aria-pressed','false');
                }
            }
        });
        </script>
</body>
</html>
